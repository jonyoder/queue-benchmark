services:
  postgres:
    image: postgres:16
    container_name: queue-benchmark-postgres
    environment:
      POSTGRES_DB: benchmark
      POSTGRES_USER: benchmark
      POSTGRES_PASSWORD: benchmark
    ports:
      - "5433:5432"  # non-default port to avoid collisions
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "log_min_duration_statement=0"
      - "-c"
      - "log_statement=none"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benchmark -d benchmark"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  postgres_data:
